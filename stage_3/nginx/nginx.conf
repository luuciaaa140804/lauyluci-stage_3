events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------------
    # Upstream: clúster de Search Services
    # least_conn: dirige cada request al nodo con menos conexiones activas
    # max_fails/fail_timeout: si un nodo falla 3 veces en 30s, se elimina
    # -------------------------------------------------------------------------
    upstream search_cluster {
        least_conn;
        server search1:8080 max_fails=3 fail_timeout=30s;
        server search2:8080 max_fails=3 fail_timeout=30s;
        server search3:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;

        # Cabecera para saber qué nodo respondió (útil para benchmarking)
        add_header X-Served-By $upstream_addr always;

        # Búsquedas -> balanceadas entre los 3 search nodes
        location /search {
            proxy_pass http://search_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Health check del propio Nginx
        location /status {
            proxy_pass http://search_cluster;
            proxy_set_header Host $host;
        }

        # Página de estado de Nginx (para monitorización)
        location /nginx_status {
            stub_status on;
            allow all;
        }
    }
}
